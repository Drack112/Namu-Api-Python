services:
  postgres:
    image: postgres:16
    container_name: namu_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-namu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-namu123}
      POSTGRES_DB: ${DB_NAME:-namu_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    tmpfs:
      - /tmp
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-namu} -d ${DB_NAME:-namu_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - namu_network

  redis:
    image: redis:7-alpine
    container_name: namu_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - namu_network

  ollama:
    image: ollama/ollama
    container_name: namu_ai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    tmpfs:
      - /tmp:size=512m,mode=1777
    environment:
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_THREADS: "${OLLAMA_NUM_THREADS:-4}"
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPU_LIMIT:-2.0}"
          memory: "${OLLAMA_MEMORY_LIMIT:-6G}"
        reservations:
          cpus: "0.5"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - namu_network

  ollama-init:
    image: ollama/ollama
    container_name: namu_ai_ollama_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3}"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - namu_network

  api:
    build: .
    container_name: namu_ai_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-namu}
      DB_PASSWORD: ${DB_PASSWORD:-namu123}
      DB_NAME: ${DB_NAME:-namu_ai}
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
    networks:
      - namu_network

volumes:
  postgres_data:
  ollama_data:

networks:
  namu_network:
    driver: bridge
